<!DOCTYPE html>
<html>
<head>
    <title>Trade Dashboard Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>body { margin: 0; padding: 0; font-family: Arial, sans-serif; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            return React.createElement("div", {style: {background: "#0F1B2D", color: "white", padding: "20px"}},
                React.createElement("h1", null, "Trade Dashboard Demo"),
                React.createElement("p", null, "Dashboard is working!")
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
